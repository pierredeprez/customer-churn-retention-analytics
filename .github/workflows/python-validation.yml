name: Python Code Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Global environment variables applied to all runner actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-python:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install notebook nbconvert pandas numpy scikit-learn

    - name: Validate Jupyter Notebooks (Syntax Check)
      run: |
        echo "Checking Jupyter Notebooks for compilation errors..."
        
        # Navigate into the notebooks directory to prevent path duplication bugs
        cd notebooks
        
        # Force conversion specifically to a Python script (.py)
        jupyter nbconvert --to python churn_and_revenue_retention_analysis.ipynb
        
        # Execute the generated Python script directly inside its folder
        python churn_and_revenue_retention_analysis.py