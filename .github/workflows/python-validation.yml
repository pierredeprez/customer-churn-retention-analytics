name: Python Code Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Global environment variables applied to all runner actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-python:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Core Dependencies
      run: |
        python -m pip install --upgrade pip
        # Added matplotlib and seaborn here
        pip install notebook nbconvert pandas numpy scikit-learn matplotlib seaborn

    - name: Validate Jupyter Notebooks (Syntax Check)
      run: |
        echo "Checking Jupyter Notebooks for compilation errors..."
        cd notebooks
        
        # 1. Convert the notebook to a pure python script
        jupyter nbconvert --to python churn_and_revenue_retention_analysis.ipynb
        
        # 2. Automatically comment out any ipython notebook line magics (fixes NameError)
        sed -i 's/get_ipython()/# get_ipython()/g' churn_and_revenue_retention_analysis.py
        
        # 3. Run the script execution syntax check
        python churn_and_revenue_retention_analysis.py
        
        # 4. Clean up the generated file so it doesn't trigger git tracking errors
        rm churn_and_revenue_retention_analysis.py