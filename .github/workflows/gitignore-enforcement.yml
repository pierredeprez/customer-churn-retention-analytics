name: Git Hygiene Enforcement

on:
  push:
  pull_request:

# Fixes the Node.js deprecation warning for this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  gitignore-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for forbidden tracked files
        run: |
          echo "Scanning for forbidden files..."
          
          # Adding '|| true' prevents grep from crashing the pipeline when your repo is clean!
          forbidden_files=$(git ls-files | grep -E '\.(csv|xlsx|parquet|json|tsv|zip|tar\.gz|log)$|\.ipynb_checkpoints/|\.env' || true)

          if [ -n "$forbidden_files" ]; then
            echo "❌ Forbidden files detected:"
            echo "$forbidden_files"
            exit 1
          else
            echo "✅ Git hygiene check passed"
          fi